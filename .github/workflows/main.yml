name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
    - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - uses: subosito/flutter-action@v1
      with:
        flutter-version: '3.38.2'
        channel: 'stable'

    - name: Install dependencies
      run: flutter pub get

    - name: Run tests
      run: flutter test

  deploy:
    runs-on: ubuntu-latest
    needs: test  # Only deploy if tests pass
    steps:
    - uses: actions/checkout@v2

    - uses: subosito/flutter-action@v1
      with:
        flutter-version: '3.38.2'
        channel: 'stable'

    - name: Enable Flutter Web
      run: flutter config --enable-web
      working-directory: './packages/docs'

    - name: Build Release Version
      run: "flutter build web --wasm --base-href \"/shadcn_flutter/\""
      working-directory: './packages/docs'

    - name: Copy to web build directory
      run: cp -r ./packages/docs/build/web ./packages/docs/public
      working-directory: './'

    - name: Copy release version config file # from ./packages/docs/config/docs-release.json to ./packages/docs/public/assets/docs.json
      run: cp -r ./packages/docs/config/docs-dev.json ./packages/docs/public/assets/docs.json
      working-directory: './'

    - name: Prepare workspace dependencies
      run: |
        dart pub get
      working-directory: './'

    - name: Generate LLMs Documentation
      run: |
        dart packages/gen/bin/llms_gen.dart
      working-directory: './'

    - name: Deploy
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: './packages/docs/public'
        force_orphan: true
        user_name: 'github-ci[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
        commit_message: 'Publish to gh-pages'
