name: genui_chat_example
description: "A full chat example that renders AI-generated shadcn_flutter UI with GenUI, backed by OpenRouter."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  shadcn_flutter: any
  shadcn_flutter_genui: any
  genui: ^0.9.2
  http: ^1.2.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
